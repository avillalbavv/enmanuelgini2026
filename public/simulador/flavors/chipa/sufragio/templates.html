<script id="tmpl_chipa/categoria" type="text/x-handlebars-template" class="raw_template">
<div class="candidato {{seleccionado}}" id="{{id_boton}}">
    <div class="nombre-cargo">{{categoria.nombre}}</div>
    <div class="lista">
        <p class="palabra-lista">{{palabra_lista}}</p>
        <p class="numero-lista">{{candidato.lista.numero}}</p>
    </div>
    <div class="foto-candidato">
        {{imagen_candidatura candidato.imagenes.[0]}}
    </div>
    <div class="foto-partido">
        {{imagen_candidatura candidato.lista.imagenes.[0]}}
    </div>
    <div class="candidato-principal">{{candidato.nombre}}</div>
    <div class="candidato-secundario"> {{{secundarios}}}</div>
    <div class="nombre-partido">{{candidato.lista.nombre}}</div>
</div>

</script>
<script id="tmpl_chipa/lista" type="text/x-handlebars-template" class="raw_template">
<div id="{{id_boton}}" class="candidato candidato-lista-completa boton-lista {{#if normal}}cand-{{cantidad_candidatos}}{{else}}candidato-agrupa{{/if}} {{seleccionado}} {{#if es_concejales}}lista-concejal-texto{{/if}}">
    {{#if es_concejales}}
        <div class="lista-concejal-texto-numero">Lista {{lista.numero}}</div>
        <div class="lista-concejal-texto-partido">{{nombre_partido}}</div>
    {{else}}
        {{#if lista.numero}}
            <div class="lista">
                <p class="palabra-lista">{{i18n "palabra_lista"}}</p>
                <p class="numero-lista">{{lista.numero}}</p>
            </div>
        {{/if}}
        {{#if normal}}
            <div class="nombre-partido">{{lista.nombre}}</div>
            <div class="foto-partido">
                {{imagen_candidatura lista.imagenes.[0]}}
            </div>

            {{#candidatos}}
                <div class="foto-candidato {{#if es_blanco}}blanco{{/if}}">
                    {{imagen_candidatura imagenes.[0]}}
                </div>
            {{/candidatos}}

            {{colores lista.color}}
            <div class="lista-candidatos">
                {{#candidatos}}
                <div class="nombre-categoria">{{categoria.nombre}}:</div>
                <div class="nombre-candidato">
                    {{#if es_blanco}}
                        {{i18n "palabra_no_presenta_candidatos"}}
                    {{else}}
                        {{nombre}}
                        {{#if categoria.cargo_ejecutivo}}
                            / {{secundarios}}
                        {{/if}}
                    {{/if}}
                </div>
                {{/candidatos}}
            </div>
        {{else}}
            <div class="foto-candidato">
                {{#if lista.imagenes.[0]}}
                    {{imagen_candidatura lista.imagenes.[0]}}
                {{/if}}
            </div>
            <div class="nombre-partido">{{lista.nombre}}</div>
        {{/if}}
    {{/if}}
</div>

</script>
<script id="tmpl_chipa/partido" type="text/x-handlebars-template" class="raw_template">
<div id="{{id_boton}}" class="candidato candidato-lista-completa partido {{extra_classes}}">
    <div class="foto-partido">
        {{imagen_candidatura partido.imagenes.[0]}}
    </div>
    {{colores lista.color}}
    <div class="nombre-partido">
        {{partido.nombre}}
    </div>
</div>

</script>
<script id="tmpl_chipa/consulta_popular" type="text/x-handlebars-template" class="raw_template">
<div id="{{id_boton}}" class="opcion-consulta candidato {{seleccionado}}">
    <div class="nombre-candidato">
        <div class="candidato-principal" style="color:{{candidato.lista.color.[0]}}">{{candidato.nombre}}</div>
        <div class="candidato-secundario">{{{candidato.secundarios}}}</div>
    </div>
</div>
</script>
<script id="tmpl_chipa/confirmacion" type="text/x-handlebars-template" class="raw_template">
<div class="conf_cerrada {{#if es_concejal}}conf_cerrada-concejal{{/if}}">
    <div class="conf_cerrada-nombre_partido">{{#if nombre_partido}}{{nombre_partido}}{{else}}{{candidato.lista.nombre}}{{/if}}</div>
    <div class="conf_cerrada-lista">
        <p class="conf_cerrada-palabra_lista">{{i18n "palabra_lista"}}</p>
        <p class="conf_cerrada-numero_lista">{{candidato.lista.numero}}</p>
    </div>

    <div class="conf_cerrada-foto_candidato">
        {{imagen_candidatura candidato.imagenes.[0]}}
    </div>
    <div class="conf_cerrada-datos_candidato">
        <div class="conf_cerrada-candidato_principal">{{candidato.nombre}}</div>
        <div class="conf_cerrada-candidato_secundario">{{candidato.secundarios.[0]}}</div>
    </div>
</div>


</script>
<script id="tmpl_chipa/confirmacion_tarjeta" type="text/x-handlebars-template" class="raw_template">
<article
    class="confirmacion_tarjeta candidato {{#if blanco}}blanco{{/if}} {{consulta_popular}} {{#if modificar}}modificable{{/if}}
            {{#if candidato.habilitar_tachas}}tachas{{/if}}"
    id="{{id_boton}}" style="background-color: {{candidato.lista.color}};
            color: {{candidato.lista.color_tipografia}};">
    <header class="confirmacion_tarjeta-header">
        <h3 class="confirmacion_tarjeta-header__titulo">
            {{categoria.nombre}}
        </h3>
    </header>
    <main class="confirmacion_tarjeta-main">
        {{> componenteConfirmacion }}
    </main>
    {{#if modificar}}
    <footer class="confirmacion_tarjeta-footer">
        {{#if boton_confirmar_claro}}
            <p class="confirmacion_tarjeta-footer__btn_claro btn-modificar-voto-js">{{i18n "modificar"}}</p>
            {{else}}
            <p class="confirmacion_tarjeta-footer__btn btn-modificar-voto-js">{{i18n "modificar"}}</p>
        {{/if}}
    </footer>
    {{/if}}
</article>

</script>
<script id="tmpl_chipa/confirmacion_candidato_blanco" type="text/x-handlebars-template" class="raw_template">
<main class="confirmacion_blanco">
    <div class="confirmacion_blanco-foto_candidato">
        {{imagen_candidatura candidato.imagenes.[0]}}
    </div>
    <div class="confirmacion_blanco-candidato_principal">{{candidato.nombre}}</div>
</main>
</script>
<script id="tmpl_chipa/candidatos_adicionales" type="text/x-handlebars-template" class="raw_template">
{{#candidatos}}
    <span>
        {{this}}{{#unless @last}};{{/unless}}
    </span>
{{/candidatos}}

</script>
<script id="tmpl_chipa/candidato_hijo" type="text/x-handlebars-template" class="raw_template">
    <div class="candidato-secundario">
      {{categoria.nombre}}: 
      {{candidato.nombre}}{{#if candidato.secundarios}}; {{/if}}
      {{{candidato.secundarios}}}
    </div>

</script>
<script id="tmpl_chipa/colores" type="text/x-handlebars-template" class="raw_template">
<div class="color-lista">
  {{#each colores}}
  <div class="color colores{{../num_colores}}" style="background:{{this}}"></div>
  {{/each}}
</div>

</script>
<script id="tmpl_chipa/solapa" type="text/x-handlebars-template" class="raw_template">
{{#categoria}}
<div class="categoria">
    {{nombre}}
</div>
{{/categoria}}
{{#candidatura}}
<div class="foto-candidato">
    {{imagen_candidatura imagenes.[0]}}
</div>
<div class="candidato-principal">
    {{nombre}}
</div>
{{/candidatura}}

</script>

<script id="tmpl_chipa/boleta_watermark" type="text/x-handlebars-template" class="raw_template">

    <svg version="1.1"
         baseProfile="full"
         width="2300" height="832"
         xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         style="font-family: 'Nimbus Sans L', Arial, Helvetica, 'Liberation Sans', sans-serif">
        {{dibujar_watermark watermark}}
    </svg>
</div>

</script>
<script id="tmpl_chipa/boleta_troquel" type="text/x-handlebars-template" class="raw_template">
<div class="troquel">
    <svg version="1.1"
         baseProfile="full"
         width="2300" height="832"
         xmlns="http://www.w3.org/2000/svg"
         xmlns:xlink="http://www.w3.org/1999/xlink"
         style="font-family: 'Nimbus Sans L', Arial, Helvetica, 'Liberation Sans', sans-serif">
        {{dibujar_troquel troquel sub_troquel}}
    </svg>
</div>

</script>
<script id="tmpl_chipa/boleta_tarjeta_voto_blanco" type="text/x-handlebars-template" class="raw_template">
<div class="candidato
            max{{candidato_maxn n_secciones}}
            {{#if (agrandar_seccion index n_columnas n_filas n_secciones)}}size_x2{{/if}}
            {{#if troquel}}con-troquel{{/if}}">
    <div class="candidato_lista_sin_imagen">
        <h3 class="sin_imagen-nombre_cargo">{{titulo}}</h3>
        <div class="datos-candidato max{{candidato_maxn n_secciones}}">
            <div class="candidato_lista_sin_imagen-candidatos justify-center">
                <div class="principales m-auto">
                    <div class="candidato_lista_sin_imagen-voto_blanco">VOTO EN BLANCO</div>
                </div>
            </div>
        </div>
    </div>
</div>
</script>

    <div class="candidato_lista_sin_imagen">
        <h3 class="sin_imagen-nombre_cargo">{{titulo}}</h3>
        <div class="datos-candidato max{{candidato_maxn n_secciones}}">

                </div>
                <p class="preferente_candidato-nro_orden">
                    <span class="preferente_candidato-nro_orden__opcion">Opci&oacute;n</span>

            </div>
        </div>
    </div>
</div>

</script>

                <div class="sin_imagen-nombre_lista">{{nombre_lista}}</div>

                    <p class="principales_titulo fw-normal">{{nombre_candidato.titulo}}</p>

<script id="tmpl_chipa/boleta_tarjeta_con_secundarios" type="text/x-handlebars-template" class="raw_template">
<div class="candidato
            max{{candidato_maxn n_secciones}}
            {{#if (agrandar_seccion index n_columnas n_filas n_secciones)}}size_x2{{/if}}
            {{#if troquel}}con-troquel{{/if}}">
    <div class="candidato_lista_sin_imagen">
        <h3 class="sin_imagen-nombre_cargo">{{titulo}}</h3>
        <div class="datos-candidato max{{candidato_maxn n_secciones}} py-5">
            {{#if nombre_candidato}}
            <div class="candidato_lista_sin_imagen-candidatos w-100 p-0">
                {{#if muestra_lista_en_primer_cargo}}
                    {{#if (es_primer_cargo index)}}
                    <div class="sin_imagen-nombre_lista mb-1">{{nombre_lista}}</div>
                    {{/if}}
                {{else}}
                <div class="sin_imagen-nombre_lista mb-1">{{nombre_lista}}</div>
                {{/if}}
                <div class="candidatos-container">
                    <div class="principales">
                        {{#if nombre_candidato.titulo}}
                        <p class="principales_titulo fw-normal">{{nombre_candidato.titulo}}</p>
                        {{/if}}
                        {{recorrer_nombre_candidatos_principales nombre_candidato.texto}}
                    </div>
                    {{#if secundarios}}
                    <div class="secundarios">
                        {{recorrer_nombre_candidatos_secundarios secundarios}}
                    </div>
                    {{/if}}
                </div>
            </div>
            {{/if}}
        </div>
    </div>
</div>

</script>
<script id="tmpl_chipa/boleta_tarjeta_con_suplentes" type="text/x-handlebars-template" class="raw_template">
<div class="candidato
            max{{candidato_maxn n_secciones}}
            {{#if (agrandar_seccion index n_columnas n_filas n_secciones)}}size_x2{{/if}}

    <div class="candidato_lista_sin_imagen">
        <h3 class="sin_imagen-nombre_cargo">{{titulo}}</h3>
